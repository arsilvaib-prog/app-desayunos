<!DOCTYPE html>
<html>
<head>
    <title>Desayunos Artur</title>

    
    <link rel="shortcut icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    
    
    <link rel="manifest" href="/manifest.json">

    <style>
    body {
        font-family: Arial;
        background: #f5f5f5;
        text-align: center;
        margin: 0;
        padding: 20px;
    }

    h1 {
        color: #ff9800;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 400px;
        margin: 0 auto;
    }

    .card {
        background: white;
        padding: 15px;
        margin: 10px 0;
        border-radius: 10px;
        width: 100%;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
    }

    button {
        background: #ff9800;
        color: white;
        padding: 15px;
        border: none;
        border-radius: 5px;
        width: 100%;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #f57c00;
    }

    input[type="text"] {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
    }

    input[type="radio"] {
        margin-right: 10px;
        transform: scale(1.2);
    }

    h3 {
        display: flex;
        align-items: center;
        margin: 10px 0;
    }

    .datos-section {
        width: 100%;
        text-align: left;
        margin-top: 20px;
    }
    </style>
</head>

<body>

<h1>🍳 Desayunos Artur</h1>

<form action="/pedido" method="POST">
<div class="container">

    <div class="card">
        <img src="/static/chilaquiles.jpg">
        <h3>
            <input type="radio" name="producto" value="Chilaquiles" required>
            Chilaquiles - $130
        </h3>
    </div>

    <div class="card">
        <img src="/static/molletes.jpg">
        <h3>
            <input type="radio" name="producto" value="Molletes">
            Molletes - $75
        </h3>
    </div>

    <div class="card">
        <img src="/static/picadas.jpg">
        <h3>
            <input type="radio" name="producto" value="Picadas Veracruzanas">
            Picadas Veracruzanas - $20
        </h3>
    </div>

    <div class="datos-section">
        <h3>📝 Tus datos</h3>
        <input type="text" name="cliente" placeholder="Tu nombre" required>
        <input type="text" name="direccion" placeholder="Dirección" required>
    </div>

    <button type="submit">Pedir ahora</button>

</div>
</form>

</body>
</html>
