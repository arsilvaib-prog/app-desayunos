<!DOCTYPE html>
<html>
<head>
    <title>Desayunos Artur</title>

    <!-- Iconos para la app -->
    <link rel="shortcut icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    
    <!-- Manifest para instalación -->
    <link rel="manifest" href="/manifest.json">

    <style>
    body {
        font-family: Arial;
        background: #f5f5f5;
        text-align: center;
        margin: 0;
        padding: 20px;
    }

    h1 {
        color: #ff9800;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 400px;
        margin: 0 auto;
    }

    .card {
        background: white;
        padding: 15px;
        margin: 10px 0;
        border-radius: 10px;
        width: 100%;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
    }

    button {
        background: #ff9800;
        color: white;
        padding: 15px;
        border: none;
        border-radius: 5px;
        width: 100%;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #f57c00;
    }

    input[type="text"] {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
    }

    input[type="radio"] {
        margin-right: 10px;
        transform: scale(1.2);
    }

    h3 {
        display: flex;
        align-items: center;
        margin: 10px 0;
    }

    .datos-section {
        width: 100%;
        text-align: left;
        margin-top: 20px;
    }

    /* Estilo para botón de WhatsApp */
    .btn-whatsapp {
        background: #25D366;
        margin-top: 15px;
    }
    
    .btn-whatsapp:hover {
        background: #128C7E;
    }

    /* Separador visual */
    .separador {
        margin: 20px 0;
        color: #999;
        font-size: 14px;
    }
    </style>
</head>

<body>

<h1>🍳 Desayunos Artur</h1>

<form id="formularioPedido" onsubmit="return enviarPedido(event)">
<div class="container">

    <!-- Producto 1: Chilaquiles -->
    <div class="card">
        <img src="/static/chilaquiles.jpg">
        <h3>
            <input type="radio" name="producto" value="Chilaquiles - $130" required>
            Chilaquiles - $130
        </h3>
    </div>

    <!-- Producto 2: Molletes -->
    <div class="card">
        <img src="/static/molletes.jpg">
        <h3>
            <input type="radio" name="producto" value="Molletes - $75">
            Molletes - $75
        </h3>
    </div>

    <!-- Producto 3: Picadas -->
    <div class="card">
        <img src="/static/picadas.jpg">
        <h3>
            <input type="radio" name="producto" value="Picadas Veracruzanas - $20">
            Picadas Veracruzanas - $20
        </h3>
    </div>

    <!-- Datos del cliente -->
    <div class="datos-section">
        <h3>📝 Tus datos</h3>
        <input type="text" id="cliente" name="cliente" placeholder="Tu nombre" required>
        <input type="text" id="direccion" name="direccion" placeholder="Dirección" required>
    </div>

    <!-- Botón de pedido (envía a WhatsApp) -->
    <button type="submit" style="background: #25D366;">📱 Enviar pedido por WhatsApp</button>

    <div class="separador">ó</div>

    <!-- Botón de contacto directo -->
    <button type="button" onclick="abrirWhatsAppDirecto()" style="background: #ff9800;">💬 Contactar por WhatsApp</button>

</div>
</form>

<script>
// Número de WhatsApp (código México 52 + número)
const NUMERO_WHATSAPP = "5214461414743";

// Función principal: cuando envían el formulario
function enviarPedido(event) {
    event.preventDefault();  // Evita que se envíe el formulario tradicional
    
    // Obtener el producto seleccionado
    let productoSeleccionado = document.querySelector('input[name="producto"]:checked');
    if (!productoSeleccionado) {
        alert("Por favor selecciona un producto");
        return false;
    }
    
    // Obtener datos del cliente
    let cliente = document.getElementById('cliente').value;
    let direccion = document.getElementById('direccion').value;
    
    if (!cliente || !direccion) {
        alert("Por favor completa todos tus datos");
        return false;
    }
    
    // Crear el mensaje (usando \n y encodeURIComponent)
    let mensaje = "🍳 *Nuevo pedido - Desayunos Artur*\n\n" +
                  "👤 *Cliente:* " + cliente + "\n" +
                  "📍 *Dirección:* " + direccion + "\n" +
                  "🍽️ *Producto:* " + productoSeleccionado.value + "\n\n" +
                  "🙏 ¡Gracias por tu pedido!";
    
    // Codificar el mensaje para la URL
    let mensajeCodificado = encodeURIComponent(mensaje);
    
    // Crear URL de WhatsApp
    let url = `https://wa.me/${NUMERO_WHATSAPP}?text=${mensajeCodificado}`;
    
    // Abrir WhatsApp (compatible con PWA)
    window.location.href = url;
    
    return false;
}

// Función para contacto directo (sin pedido)
function abrirWhatsAppDirecto() {
    let mensaje = "Hola, quiero información sobre los desayunos";
    let mensajeCodificado = encodeURIComponent(mensaje);
    let url = `https://wa.me/${NUMERO_WHATSAPP}?text=${mensajeCodificado}`;
    
    // Abrir WhatsApp (compatible con PWA)
    window.location.href = url;
}
</script>

</body>
</html>
